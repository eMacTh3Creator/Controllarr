name: Controllarr
options:
  bundleIdPrefix: com.controllarr
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Controllarr:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ONLY_ACTIVE_ARCH: YES
    ENABLE_HARDENED_RUNTIME: YES
    # Ad-hoc sign by default so the .app runs locally without a
    # Developer ID certificate. Override to your identity when you
    # have one.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  Controllarr:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: WebUI/dist
        name: WebUI
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Controllarr
        PRODUCT_BUNDLE_IDENTIFIER: com.controllarr.Controllarr
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: App/Controllarr.entitlements
    info:
      path: App/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSUIElement: NO
        CFBundleDisplayName: Controllarr
        NSHumanReadableCopyright: "Copyright © 2026 Everett Jenkins. MIT Licensed."
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: "public.app-category.utilities"
        NSSupportsAutomaticTermination: NO
        NSSupportsSuddenTermination: NO
    dependencies:
      - package: Controllarr
        product: ControllarrCore
      - package: Controllarr
        product: TorrentEngine
      - package: Controllarr
        product: Persistence
      - package: Controllarr
        product: PortWatcher
      - package: Controllarr
        product: Services
      - package: Controllarr
        product: HTTPServer
